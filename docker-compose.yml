version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: thai-meow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: thai-meow
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - thai-meow-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thai-meow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/thai-meow?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-change-me-to-secure-secret}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:19006,http://localhost:19000
      - VAJAX_API_KEY=${VAJAX_API_KEY:-}
      - VAJAX_SPEAKER=${VAJAX_SPEAKER:-nana}
      - VAJAX_STYLE=${VAJAX_STYLE:-nana}
      - VAJAX_SPEED=${VAJAX_SPEED:-1.0}
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/access.log:/app/access.log
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - thai-meow-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: thai-meow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - thai-meow-network
    profiles:
      - production

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  thai-meow-network:
    driver: bridge
